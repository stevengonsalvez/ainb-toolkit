# YAML Frontmatter Schema for docs/solutions/
# This schema defines the required and optional fields for learning documents

$schema: "http://json-schema.org/draft-07/schema#"
title: Learning Document Schema
description: Schema for knowledge capture documents in docs/solutions/

type: object
required:
  - title
  - category
  - tags
  - symptoms
  - root_cause
  - key_insight
  - created
  - confidence

properties:
  title:
    type: string
    description: Brief descriptive title (50-100 chars)
    minLength: 10
    maxLength: 150

  category:
    type: string
    description: Category directory for this learning
    enum:
      - build-errors
      - performance-issues
      - security-fixes
      - testing-patterns
      - debugging-sessions
      - architecture-decisions
      - api-integrations
      - dependency-issues
      - deployment-fixes
      - database-migrations
      - ui-patterns
      - tooling-setup

  tags:
    type: array
    description: Searchable keywords/technologies
    items:
      type: string
    minItems: 1
    maxItems: 10
    examples:
      - [rust, async, tokio]
      - [typescript, react, hooks]
      - [python, django, orm]

  symptoms:
    type: array
    description: Error messages or observable behaviors
    items:
      type: string
    minItems: 1
    examples:
      - ["Cannot start a runtime from within a runtime"]
      - ["TypeError: Cannot read property 'x' of undefined"]

  root_cause:
    type: string
    description: The actual cause of the problem
    minLength: 10

  key_insight:
    type: string
    description: THE ONE THING that fixes it - most important field
    minLength: 10
    maxLength: 500

  related:
    type: array
    description: Relative paths to related learning documents
    items:
      type: string
      pattern: "^\\./"
    examples:
      - [./other-doc.md, ./another-related.md]

  created:
    type: string
    description: Date created (ISO format)
    format: date
    examples:
      - "2026-02-11"

  confidence:
    type: string
    description: How confident we are in this solution
    enum:
      - high    # Verified fix, well understood
      - medium  # Works but not fully understood
      - low     # Workaround, may not be ideal

  # Optional fields for enhanced search
  language:
    type: string
    description: Primary programming language
    examples:
      - rust
      - typescript
      - python
      - go

  framework:
    type: string
    description: Framework or major library
    examples:
      - react
      - django
      - tokio
      - express

  environment:
    type: string
    description: Where the issue occurs
    enum:
      - development
      - ci
      - staging
      - production
      - all

  severity:
    type: string
    description: How impactful the issue is
    enum:
      - critical  # Blocks work, data loss risk
      - high      # Significant impact
      - medium    # Noticeable but workable
      - low       # Minor inconvenience

# Example valid document:
#
# ---
# title: "Tokio runtime panic on nested block_on"
# category: build-errors
# tags: [rust, tokio, async, runtime]
# symptoms:
#   - "Cannot start a runtime from within a runtime"
#   - "thread 'main' panicked"
# root_cause: "Calling block_on() inside an async context"
# key_insight: "Use tokio::task::spawn_blocking or restructure to avoid nesting"
# related: [./async-patterns.md]
# created: 2026-02-11
# confidence: high
# language: rust
# framework: tokio
# ---
