# =============================================================================
# Unified Extensions Manifest
# =============================================================================
#
# Tracks ALL plugins, skills, and tools across the toolkit ecosystem.
# This is the single source of truth for external dependencies.
#
# Usage:
#   - Run `/plugins list` to see all installed extensions
#   - Run `/plugins sync` to update this manifest from current state
#   - Run `/plugins export` to generate reproducible install script
#
# =============================================================================

version: "1.0.0"
updated: "2026-03-07"

# =============================================================================
# BUNDLED SKILLS (included in toolkit/packages/skills/)
# =============================================================================
# These are built-in skills that come with the toolkit. No installation needed.
# They are automatically available when the toolkit is installed.
bundled-skills:
  - name: webapp-testing
    path: packages/skills/webapp-testing
    purpose: "Playwright-based web app testing and browser automation"
    features:
      - Browser screenshot capture
      - UI element interaction
      - End-to-end testing workflows

  - name: crypto-research
    path: packages/skills/crypto-research
    purpose: "Multi-agent cryptocurrency market analysis"
    features:
      - Market data analysis
      - Price trends and technical indicators
      - News sentiment analysis

  - name: frontend-design
    path: packages/skills/frontend-design
    purpose: "Production-grade UI/UX generation"
    features:
      - Distinctive interface designs
      - Responsive layouts
      - Modern styling patterns

  - name: tmux-monitor
    path: packages/skills/tmux-monitor
    purpose: "tmux session monitoring and management"
    features:
      - Session status reporting
      - Process monitoring
      - Development environment tracking

  - name: retro-pdf
    path: packages/skills/retro-pdf
    purpose: "Markdown to LaTeX PDF conversion"
    features:
      - Professional PDF generation
      - LaTeX template support
      - Custom styling options

  - name: interview
    path: packages/skills/interview
    purpose: "Plan interview and specification generation"
    features:
      - Systematic interviewing about plans
      - Technical, UX, and business questioning
      - Comprehensive specification output
      - Works with Claude Code and Codex

  - name: reflect
    path: packages/skills/reflect
    purpose: "Self-improvement through conversation analysis"
    features:
      - Extract learnings from corrections
      - Detect success patterns
      - Propose agent file updates
      - Create new skills from learnings

  - name: remotion-best-practices
    path: packages/skills/remotion-best-practices
    purpose: "Best practices for Remotion - Video creation in React"
    features:
      - 3D content with Three.js and React Three Fiber
      - Animation patterns and timeline composition
      - Asset management (images, video, audio, fonts)
      - Caption display and TikTok-style text overlays
      - Chart and data visualization patterns

  - name: media-processing
    path: packages/skills/media-processing
    source: "https://github.com/mrgoonie/claudekit-skills/tree/main/.claude/skills/media-processing"
    purpose: "FFmpeg and ImageMagick multimedia processing"
    features:
      - Video encoding/conversion (H.264, H.265, VP9, AV1)
      - Audio extraction and transcoding
      - Image manipulation and batch processing
      - HLS/DASH streaming manifest generation
      - Hardware acceleration (NVENC, QuickSync)
      - Python scripts for batch resize, convert, and optimize

# =============================================================================
# AGENT SKILLS (cross-agent git repos — agentskills.io standard)
# =============================================================================
# Installed by bootstrap via git clone to ~/.{tool}/skills/{name}/
# These follow the SKILL.md standard and work across Claude, Codex, Copilot.
# Reference is committed here; actual files pulled at bootstrap time.
agent-skills:
  - name: ui-ux-pro-max
    repo: https://github.com/nextlevelbuilder/ui-ux-pro-max-skill
    version: "2.2.1"
    applies-to: [claude, codex, copilot]
    purpose: "UI/UX design intelligence with searchable database of styles, palettes, fonts, and UX guidelines"
    features:
      - 67 UI styles (glassmorphism, claymorphism, brutalism, neumorphism, etc.)
      - 96 color palettes organized by industry
      - 57 font pairings with Google Fonts integration
      - 99 UX guidelines with priority ranking
      - 25 chart types for data visualization
      - 13 stack guidelines (React, Next.js, Vue, Svelte, Astro, Nuxt, SwiftUI, Flutter, etc.)
      - Python search engine with --design-system flag for complete recommendations
      - --persist flag to save hierarchical design system (MASTER.md + page overrides)

  - name: notebooklm
    repo: https://github.com/PleasePrompto/notebooklm-skill
    applies-to: [claude, codex, copilot]
    purpose: "Query Google NotebookLM notebooks for source-grounded, citation-backed answers via browser automation"
    features:
      - Browser automation with Patchright for NotebookLM interaction
      - Persistent Google authentication
      - Notebook library management with metadata and topic search
      - Stateless query model (fresh browser session per question)
      - Follow-up question mechanism for comprehensive answers
      - Python scripts with auto-managed .venv environment

# =============================================================================
# EXTERNAL PLUGINS (Claude Code marketplace)
# =============================================================================
# Installed via `claude plugin install`. Tracked in ~/.claude/plugins/
claude-plugins:
  - name: beads
    marketplace: steveyegge/beads
    marketplace_id: beads-marketplace
    version: "0.49.0"
    install: |
      claude plugin marketplace add steveyegge/beads
      claude plugin install beads
    purpose: "Git-backed issue tracking for multi-session work"
    features:
      - Persistent issue tracking across sessions
      - Dependency management between issues
      - Context recovery after conversation compaction

  - name: debug-bridge
    marketplace: stevengonsalvez/agent-bridge
    marketplace_id: agent-bridge-marketplace
    version: "0.2.0"
    install: |
      claude plugin marketplace add stevengonsalvez/agent-bridge
      claude plugin install debug-bridge
    purpose: "Browser automation and inspection via WebSocket"
    features:
      - Real-time browser control
      - Element inspection
      - Screenshot capture

  - name: ralph-loop
    marketplace: anthropics/claude-plugins-official
    marketplace_id: claude-plugins-official
    version: "55b58ec6e564"
    install: |
      claude plugin marketplace add anthropics/claude-plugins-official
      claude plugin install ralph-loop
    purpose: "Iterative refinement loop for continuous improvement"
    features:
      - Feedback-driven iteration
      - Quality improvement cycles

  - name: code-review
    marketplace: anthropics/claude-plugins-official
    marketplace_id: claude-plugins-official
    version: "55b58ec6e564"
    install: |
      claude plugin marketplace add anthropics/claude-plugins-official
      claude plugin install code-review
    purpose: "Pull request code review automation"
    features:
      - Automated PR analysis
      - Code quality checks
      - Review comment generation

  - name: playground
    marketplace: anthropics/claude-plugins-official
    marketplace_id: claude-plugins-official
    install: |
      claude plugin marketplace add anthropics/claude-plugins-official
      claude plugin install playground
    purpose: "Interactive HTML playground generator for visual configuration"
    features:
      - Self-contained HTML playground files
      - Interactive controls with live preview
      - Prompt output generation with copy button
      - Templates for common use cases
    templates:
      - design-playground: "Visual design decisions (components, layouts, spacing, color, typography)"
      - data-explorer: "Data and query building (SQL, APIs, pipelines, regex)"
      - concept-map: "Learning and exploration (concept maps, knowledge gaps, scope mapping)"
      - document-critique: "Document review (suggestions with approve/reject/comment workflow)"
    docs: "https://github.com/anthropics/claude-plugins-official/tree/main/plugins/playground"

  - name: dev-browser
    marketplace: sawyerhood/dev-browser
    marketplace_id: sawyerhood-dev-browser
    version: "66682fb0513a"
    install: |
      claude plugin marketplace add sawyerhood/dev-browser
      claude plugin install dev-browser@sawyerhood/dev-browser
    purpose: "Browser automation skill for web testing and verification"
    features:
      - Persistent Chromium browser control (maintains cookies, localStorage, page state)
      - ARIA snapshot element discovery for complex web layouts
      - Screenshot capture for visual feedback
      - Two modes: fresh Chromium instance or Chrome extension for existing sessions
      - Multi-step form filling and authenticated portal navigation
      - Web scraping and data extraction
    docs: "https://github.com/SawyerHood/dev-browser"

  - name: skill-creator
    marketplace: anthropics/claude-plugins-official
    marketplace_id: claude-plugins-official
    version: "205b6e0b3036"
    install: |
      claude plugin marketplace add anthropics/claude-plugins-official
      claude plugin install skill-creator
    purpose: "Create new skills, modify existing skills, and measure skill performance"
    features:
      - Create skills from scratch
      - Update and optimize existing skills
      - Skill performance benchmarking
      - Eval-driven skill improvement

  - name: open-prose
    marketplace: anthropics/prose
    marketplace_id: prose
    version: "0.8.1"
    install: |
      claude plugin marketplace add anthropics/prose
      claude plugin install open-prose
    purpose: "OpenProse programming language for AI sessions and multi-agent workflows"
    features:
      - Declarative AI workflow scripting
      - Multi-agent orchestration via .prose files
      - Variable binding and context passing
      - Parallel and sequential execution blocks
      - Skills and imports composition
    docs: "https://github.com/anthropics/prose"

# =============================================================================
# NPX SKILLS (agent skills from npm/GitHub)
# =============================================================================
# Installed via `npx skills add`. These follow the agentskills.io specification.
# See: https://github.com/vercel-labs/add-skill
npx-skills:
  - name: agent-browser
    repo: vercel-labs/agent-browser
    install: "npx add-skill vercel-labs/agent-browser"
    purpose: "Browser automation CLI for AI agents"
    features:
      - Navigate to URLs (agent-browser open <url>)
      - Snapshot interactive elements with refs (@e1, @e2)
      - Click and fill using refs
      - Browserbase remote browser support
    docs: "https://github.com/vercel-labs/agent-browser"

  - name: agent-skills
    repo: vercel-labs/agent-skills
    install: "npx add-skill vercel-labs/agent-skills"
    purpose: "React and Next.js optimization patterns (10+ years of best practices)"
    features:
      - React best practices
      - Next.js optimization rules
      - Performance patterns
    docs: "https://github.com/vercel-labs/agent-skills"

# =============================================================================
# CODEX SKILLS (from developers.openai.com/codex/skills)
# =============================================================================
# Installed via $skill-installer in Codex. Stored in $CODEX_HOME/skills/
codex-skills: []
  # Example entry:
  # - name: linear
  #   source: ".experimental"
  #   install: "Use $skill-installer in Codex"
  #   purpose: "Linear issue management"

# =============================================================================
# COPILOT SKILLS (GitHub Copilot CLI skills)
# =============================================================================
# Installed to ~/.copilot/skills/ via `npx add-skill` or similar.
# Invocable via /skillname in Copilot CLI.
# See: https://docs.github.com/en/copilot/how-tos/copilot-cli/customize-copilot/create-skills
copilot-skills: []
  # Example entry:
  # - name: my-skill
  #   install: "npx add-skill org/my-skill"
  #   purpose: "Description of what this skill does"

# =============================================================================
# MCP SERVERS
# =============================================================================
# Model Context Protocol servers configured in claude_desktop_config.json
mcp-servers:
  - name: context7
    config_location: "~/.claude/settings.json"
    purpose: "Documentation lookup for programming libraries"
    features:
      - Up-to-date library docs
      - Code example retrieval
      - API reference lookup

  - name: mcporter
    config_location: "~/Library/Application Support/Claude/claude_desktop_config.json"
    install: "npx -y mcporter@latest stdio"
    purpose: "MCP server for port forwarding and local service exposure"
    features:
      - Local port forwarding
      - Service tunneling for Claude Desktop

# =============================================================================
# KNOWN MARKETPLACES
# =============================================================================
# Claude plugin marketplaces that have been added
marketplaces:
  - id: claude-plugins-official
    repo: anthropics/claude-plugins-official
    description: "Official Anthropic plugins"

  - id: anthropic-agent-skills
    repo: anthropics/skills
    description: "Official Anthropic agent skills"

  - id: agent-bridge-marketplace
    repo: stevengonsalvez/agent-bridge
    description: "Browser automation tools"

  - id: beads-marketplace
    repo: steveyegge/beads
    description: "Git-backed issue tracking"

  - id: claude-code-plugins
    repo: anthropics/claude-code
    description: "Claude Code built-in plugins"

  - id: sawyerhood-dev-browser
    repo: sawyerhood/dev-browser
    description: "Browser DevTools integration"

  - id: prose
    repo: anthropics/prose
    description: "OpenProse AI workflow language"
