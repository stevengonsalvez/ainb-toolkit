# =============================================================================
# Unified Extensions Manifest
# =============================================================================
#
# Tracks ALL plugins, skills, and tools across the toolkit ecosystem.
# This is the single source of truth for external dependencies.
#
# Usage:
#   - Run `/plugins list` to see all installed extensions
#   - Run `/plugins sync` to update this manifest from current state
#   - Run `/plugins export` to generate reproducible install script
#
# =============================================================================

version: "1.0.0"
updated: "2026-04-27"

# =============================================================================
# EXTERNAL PACKAGES (Python/Node packages installed globally per machine)
# =============================================================================
# Packages bootstrap installs once per machine (not per-project / per-harness).
# These are CLI-level dependencies that multiple harnesses share. Bootstrap
# detects an existing install via `<cli> --version` and skips reinstall when
# present, unless --force is set.
external-packages:
  - name: reflect-kb
    source: https://github.com/stevengonsalvez/reflect-kb.git
    install: "uv tool install --force '{source}[graph]'"
    cli: reflect
    version-pin: main
    requires:
      - "uv (https://github.com/astral-sh/uv) — required, no fallback"
      - "python3 (>=3.11)"
    purpose: "Universal cross-harness retrieval + learning KB for AI coding agents"
    features:
      - Vector + GraphRAG hybrid retrieval over the global learnings cache
      - Cross-harness CLI (Claude / Codex / Copilot share the same `reflect` binary)
      - Per-harness adapters (toolkit/packages/plugins/reflect/adapters/) wire
        pointer SKILL.md files into ~/.{claude,codex,copilot}/skills/
      - SessionStart hook integration on Claude (reflect-kb/adapters/claude)
    overrides:
      env: REFLECT_KB_SOURCE  # local path or git URL — overrides default repo for dev iteration
    docs: "https://github.com/stevengonsalvez/reflect-kb"

# =============================================================================
# BUNDLED SKILLS (included in toolkit/packages/skills/)
# =============================================================================
# These are built-in skills that come with the toolkit. No installation needed.
# They are automatically available when the toolkit is installed.
bundled-skills:
  - name: coding-agent
    path: packages/skills/coding-agent
    purpose: "Delegate coding tasks to Codex, Claude Code, OpenCode, Pi, or GitHub Copilot via tmux sessions"
    features:
      - Pure tmux execution model (PTY automatic, one lifecycle)
      - 5 agent providers with Claude Code as primary, fallback chain to Codex/Copilot
      - Temp-dir / worktree isolation for PR reviews
      - Parallel issue fixing across worktrees
      - ACP/Discord auto-notify patterns for completion tracking
      - References /cloud-coding-agent for long-running cloud tasks

  - name: webapp-testing
    path: packages/skills/webapp-testing
    purpose: "Playwright-based web app testing and browser automation"
    features:
      - Browser screenshot capture
      - UI element interaction
      - End-to-end testing workflows

  - name: crypto-research
    path: packages/skills/crypto-research
    purpose: "Multi-agent cryptocurrency market analysis"
    features:
      - Market data analysis
      - Price trends and technical indicators
      - News sentiment analysis

  - name: frontend-design
    path: packages/skills/frontend-design
    purpose: "Production-grade UI/UX generation"
    features:
      - Distinctive interface designs
      - Responsive layouts
      - Modern styling patterns

  - name: tmux-monitor
    path: packages/skills/tmux-monitor
    purpose: "tmux session monitoring and management"
    features:
      - Session status reporting
      - Process monitoring
      - Development environment tracking

  - name: retro-pdf
    path: packages/skills/retro-pdf
    purpose: "Markdown to LaTeX PDF conversion"
    features:
      - Professional PDF generation
      - LaTeX template support
      - Custom styling options

  - name: interview
    path: packages/skills/interview
    purpose: "Plan interview and specification generation"
    features:
      - Systematic interviewing about plans
      - Technical, UX, and business questioning
      - Comprehensive specification output
      - Works with Claude Code and Codex

  - name: reflect
    path: packages/plugins/reflect
    plugin-version: "3.1.0"
    purpose: "Self-improvement + retrieval plugin (v3, colon-namespaced sub-skills + SessionStart hook)"
    multi-skill: true
    skills:
      - reflect: "Extract learnings from corrections + success patterns; encode into agent definitions"
      - "reflect:consolidate": "Merge orphaned worktree memory dirs into project .agents/MEMORY.md"
      - "reflect:ingest": "Index memories into GraphRAG + QMD knowledge base"
      - recall: "Hybrid vector+graph retrieval over the global learnings KB; auto-injected at SessionStart"
      - reflect-status: "Read-only metrics, pending reviews, sidecar coverage, GraphRAG health; approve/reject low-confidence items"
    install: "python3 toolkit/packages/plugins/reflect/adapters/claude/claude_adapter.py install --force"
    config:
      - "toolkit/packages/plugins/reflect/reflect.toml (plugin default)"
      - "~/.reflect/reflect.toml (user override)"
      - ".reflect.toml (project override)"
    requires:
      - "reflect-kb (uv tool install — see external-packages above)"
    features:
      - Extract learnings on correction or success-pattern signal
      - Auto-injected recall preamble at SessionStart via hook
      - Multi-tool memory discovery (claude / codex / gemini / copilot)
      - Pointer-style sub-skill install (cheap to redeploy)

  - name: remotion-best-practices
    path: packages/skills/remotion-best-practices
    purpose: "Best practices for Remotion - Video creation in React"
    features:
      - 3D content with Three.js and React Three Fiber
      - Animation patterns and timeline composition
      - Asset management (images, video, audio, fonts)
      - Caption display and TikTok-style text overlays
      - Chart and data visualization patterns

  - name: media-processing
    path: packages/skills/media-processing
    source: "https://github.com/mrgoonie/claudekit-skills/tree/main/.claude/skills/media-processing"
    purpose: "FFmpeg and ImageMagick multimedia processing"
    features:
      - Video encoding/conversion (H.264, H.265, VP9, AV1)
      - Audio extraction and transcoding
      - Image manipulation and batch processing
      - HLS/DASH streaming manifest generation
      - Hardware acceleration (NVENC, QuickSync)
      - Python scripts for batch resize, convert, and optimize

# =============================================================================
# AGENT SKILLS (cross-agent git repos — agentskills.io standard)
# =============================================================================
# Installed by bootstrap via git clone to ~/.{tool}/skills/{name}/
# These follow the SKILL.md standard and work across Claude, Codex, Copilot.
# Reference is committed here; actual files pulled at bootstrap time.
agent-skills:
  - name: ui-ux-pro-max
    repo: https://github.com/nextlevelbuilder/ui-ux-pro-max-skill
    version: "2.2.1"
    multi-subpath: .claude/skills
    applies-to: [claude, codex, copilot, gemini]
    purpose: "UI/UX design intelligence with searchable database of styles, palettes, fonts, and UX guidelines"
    features:
      - 67 UI styles (glassmorphism, claymorphism, brutalism, neumorphism, etc.)
      - 96 color palettes organized by industry
      - 57 font pairings with Google Fonts integration
      - 99 UX guidelines with priority ranking
      - 25 chart types for data visualization
      - 13 stack guidelines (React, Next.js, Vue, Svelte, Astro, Nuxt, SwiftUI, Flutter, etc.)
      - Python search engine with --design-system flag for complete recommendations
      - --persist flag to save hierarchical design system (MASTER.md + page overrides)

  - name: notebooklm
    repo: https://github.com/PleasePrompto/notebooklm-skill
    applies-to: [claude, codex, copilot, gemini]
    purpose: "Query Google NotebookLM notebooks for source-grounded, citation-backed answers via browser automation"
    features:
      - Browser automation with Patchright for NotebookLM interaction
      - Persistent Google authentication
      - Notebook library management with metadata and topic search
      - Stateless query model (fresh browser session per question)
      - Follow-up question mechanism for comprehensive answers
      - Python scripts with auto-managed .venv environment

  - name: scrapling-official
    source: "https://clawhub.ai/d4vinci/scrapling-official"
    version: "0.4.3"
    applies-to: [claude, codex, copilot]
    purpose: "Adaptive web scraping with anti-bot bypass, stealth browsing, and spider framework"
    features:
      - Anti-bot bypass (Cloudflare Turnstile, etc.)
      - Stealth headless browsing with fingerprint spoofing
      - Spider framework for concurrent multi-session crawls
      - Adaptive parsing that learns from website changes
      - CLI extraction commands (get, fetch, stealthy-fetch)
    requires:
      - "python3 (3.10+)"
      - "pip install 'scrapling[all]>=0.4.3'"
      - "scrapling install --force"

  - name: fireworks-tech-graph
    repo: https://github.com/yizhiyanhua-ai/fireworks-tech-graph
    applies-to: [claude, codex, copilot, gemini]
    purpose: "Generate publication-quality SVG+PNG technical diagrams across 14 diagram types and 7 visual styles"
    features:
      - 14 diagram types (architecture, flowchart, sequence, UML class, ER, use-case, timeline, mind map, data flow, memory arch, state machine, concept map, comparison matrix, agent architecture)
      - 7 visual styles (Flat Icon, Dark Terminal, Blueprint, Notion Clean, Glassmorphism, Claude Official, OpenAI Official)
      - Reusable SVG templates + JSON-driven generation
      - Helper scripts for validation (scripts/validate-svg.sh) and PNG export
      - Chinese + English trigger phrases
      - MIT licensed
    requires:
      - "rsvg-convert (librsvg) for PNG export — `brew install librsvg`"
    docs: "https://github.com/yizhiyanhua-ai/fireworks-tech-graph"

  # ---------------------------------------------------------------------------
  # Catalog-only entries below — listed for discoverability / alternatives
  # consideration but NOT installed by bootstrap. Flip `catalog-only: true` to
  # a proper `applies-to` list if you want to start installing one.
  # ---------------------------------------------------------------------------
  - name: architecture-diagram
    repo: https://github.com/Cocoon-AI/architecture-diagram-generator
    subpath: architecture-diagram
    catalog-only: true
    purpose: "(alternative to fireworks-tech-graph) Dark-themed HTML+SVG architecture diagrams with summary cards"
    features:
      - Self-contained HTML with inline SVG and CSS
      - Semantic color palette by component type (frontend, backend, db, cloud, security)
      - JetBrains Mono typography with technical aesthetic
      - Security group and region boundary visual primitives
      - Summary cards + pulsing dot indicator baked into layout
      - MIT licensed
    docs: "https://github.com/Cocoon-AI/architecture-diagram-generator"
    notes: "Single-style, architecture-only. fireworks-tech-graph chosen as primary for broader diagram-type coverage."

  - name: stitch-skills
    repo: https://github.com/google-labs-code/stitch-skills
    multi-subpath: skills
    applies-to: [claude, codex, copilot, gemini]
    purpose: "Google Stitch design-to-code skills for UI generation, React components, and video walkthroughs"
    multi-skill: true
    skills:
      - design-md: "Synthesize semantic design systems into DESIGN.md"
      - enhance-prompt: "Transform vague UI ideas into Stitch-optimized prompts"
      - react-components: "Convert Stitch designs into modular Vite/React components"
      - remotion: "Generate walkthrough videos from Stitch projects"
      - shadcn-ui: "shadcn/ui component integration and best practices"
      - stitch-design: "Unified Stitch design entry point with prompt enhancement"
      - stitch-loop: "Autonomous baton-passing loop for iterative website building"
    features:
      - Stitch MCP integration for AI-powered UI generation
      - Design system synthesis from visual designs
      - React component extraction with AST validation
      - Remotion video walkthrough generation
      - shadcn/ui component discovery and customization

  - name: mcporter
    repo: https://github.com/openclaw/mcporter
    homepage: "http://mcporter.dev"
    install: "npm install -g mcporter@latest"
    cli: mcporter
    applies-to: [claude, codex, copilot]
    purpose: "List, configure, auth, and call MCP servers/tools directly (HTTP or stdio) without registering them into Claude Code context. Includes ad-hoc servers, config edits, and CLI/type generation."
    features:
      - HTTP and stdio MCP server invocation
      - Per-server config in ~/.mcporter/mcporter.json
      - Auth flow management (one-shot login)
      - CLI/type generation for ad-hoc tool wrappers
    notes: "Used to keep occasional-use MCP tools (mobile, claude-peers) out of the Claude Code per-turn schema budget. See mcporter-servers section below for tracked entries. SKILL.md ships from the openclaw/mcporter repo (NOT from the stevengonsalvez/nanoclaw fork)."

  - name: graphify
    repo: https://github.com/safishamsi/graphify
    pypi: graphifyy
    version: "0.5.4"
    install: "uv tool install --force --upgrade graphifyy"
    cli: graphify
    applies-to: [claude, codex, copilot]
    purpose: "Knowledge-graph builder over folders/repos with community detection — outputs interactive HTML + GraphRAG JSON + GRAPH_REPORT.md"
    features:
      - Multi-input ingestion (code, docs, papers, images, audio via Whisper)
      - Community detection clustering with audit trail
      - Three outputs:  interactive HTML viz / GraphRAG-ready JSON / plain-language GRAPH_REPORT.md
      - Cross-repo merge mode for unified graphs
      - Incremental --update mode (re-extract only new/changed files)
      - Directed-graph mode preserving edge direction
    docs: "https://graphify.net/"
    notes: "PyPI package name is `graphifyy` (double-y) but CLI/skill name is `graphify`. Skill SKILL.md ships with version pin in .graphify_version."

