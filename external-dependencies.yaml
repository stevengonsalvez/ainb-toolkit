        - SSL analysis and tech stack detection
        - Vulnerability scanning and OSINT

    - name: pentagi
      homepage: "https://github.com/vxcontrol/pentagi"
      purpose: "Fully autonomous AI pentest system with sandboxed Docker execution and 20+ security tools"

    - name: shannon
      homepage: "https://github.com/keygraph/shannon"
      purpose: "Autonomous AI pentest framework for web apps and APIs"

    - name: webcopilot
      version: "2.0.0"
      purpose: "Automated web security recon and vulnerability scanning (subdomains, XSS, SQLi, SSRF, LFI, RCE, Open Redirect)"

    - name: supabase-sentinel
