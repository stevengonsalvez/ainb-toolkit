# YAML Frontmatter Schema for docs/solutions/
# This schema defines the required and optional fields for learning documents

$schema: "http://json-schema.org/draft-07/schema#"
title: Learning Document Schema
description: Schema for knowledge capture documents in docs/solutions/

type: object
required:
  - title
  - category
  - tags
  - symptoms
  - root_cause
  - key_insight
  - created
  - confidence

properties:
  title:
    type: string
    description: Brief descriptive title (50-100 chars)
    minLength: 10
    maxLength: 150

  category:
    type: string
    description: Category directory for this learning
    enum:
      - build-errors
      - performance-issues
      - security-fixes
      - testing-patterns
      - debugging-sessions
      - architecture-decisions
      - api-integrations
      - dependency-issues
      - deployment-fixes
      - database-migrations
      - ui-patterns
      - tooling-setup

  tags:
    type: array
    description: Searchable keywords/technologies
    items:
      type: string
    minItems: 1
    maxItems: 10
    examples:
      - [rust, async, tokio]
      - [typescript, react, hooks]
      - [python, django, orm]

  symptoms:
    type: array
    description: Error messages or observable behaviors
    items:
      type: string
    minItems: 1
    examples:
      - ["Cannot start a runtime from within a runtime"]
      - ["TypeError: Cannot read property 'x' of undefined"]

  root_cause:
    type: string
    description: The actual cause of the problem
    minLength: 10

  key_insight:
    type: string
    description: THE ONE THING that fixes it - most important field
    minLength: 10
    maxLength: 500

  related:
    type: array
    description: Relative paths to related learning documents
    items:
      type: string
      pattern: "^\\./"
    examples:
      - [./other-doc.md, ./another-related.md]

  created:
    type: string
    description: Date created (ISO format)
    format: date
    examples:
      - "2026-02-11"

  confidence:
    type: string
    description: How confident we are in this solution
    enum:
      - high    # Verified fix, well understood
      - medium  # Works but not fully understood
      - low     # Workaround, may not be ideal

  # Optional fields for enhanced search
  language:
    type: string
    description: Primary programming language
    examples:
      - rust
      - typescript
      - python
      - go

  framework:
    type: string
    description: Framework or major library
    examples:
      - react
      - django
      - tokio
      - express

  environment:
    type: string
    description: Where the issue occurs
    enum:
      - development
      - ci
      - staging
      - production
      - all

  severity:
    type: string
    description: How impactful the issue is
    enum:
      - critical  # Blocks work, data loss risk
      - high      # Significant impact
      - medium    # Noticeable but workable
      - low       # Minor inconvenience

# ---------------------------------------------------------------------------
# Entity Sidecar Schema (.entities.yaml)
# ---------------------------------------------------------------------------
# Companion to the learning .md note. Mirrors the contract enforced by
# ~/.learnings/cli/entity_store.py::DocumentEntities.from_yaml. Use
# scripts/validate_sidecar.py to check a sidecar before indexing.
sidecar_schema:
  type: object
  properties:
    document_id:
      type: string
      description: "Learning id, typically lrn-{slug}-{hash6}"
    extracted_at:
      type: string
      format: date-time
    entities:
      type: array
      items:
        type: object
        required: [name, type, description]
        properties:
          name:
            type: string
            description: "Canonical lowercase entity name"
          type:
            type: string
            enum: [technology, error, pattern, function, concept, tool]
          description:
            type: string
            description: "Brief one-line description of the entity"
    relationships:
      type: array
      items:
        type: object
        required: [source, target, type, description]
        properties:
          source:
            type: string
            description: "Entity name on the 'from' side of the relationship"
          target:
            type: string
            description: "Entity name on the 'to' side of the relationship"
          type:
            type: string
            enum: [caused_by, solves, requires, relates_to]
          description:
            type: string
            description: "How the two entities relate"
          strength:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
