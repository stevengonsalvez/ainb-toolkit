# Codex CLI configuration
# See: https://developers.openai.com/codex/guides/agents-md/
#
# Canonical PORTABLE codex config synced into ainb-toolkit so a fresh machine
# gets sane, SAFE defaults out of the box. Two classes of settings are
# deliberately excluded and must NOT be added here:
#   1. Machine-managed state (project trust tables, hook trust hashes, one-time
#      notices, first-run TUI nudges) - path-keyed, leaks private repo names,
#      regenerated by codex per machine.
#   2. Personal / security-sensitive toggles - telemetry exporters (otel),
#      user-prompt logging, full-access-warning suppression. Fine on a personal
#      machine, unsafe as a default that seeds every install. Keep those in your
#      own ~/.codex/config.toml, never in this shared file.

# --- General preferences ---
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
# Keep a human in the approval loop (safe default).
approvals_reviewer = "user"

# --- Status line ---
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

# --- Project doc fallback ---
# Treat these filenames as instruction sources when AGENTS.md isn't present.
project_doc_fallback_filenames = ["CLAUDE.md", "TEAM_GUIDE.md", ".agents.md"]

# Allow larger combined guidance before truncation.
project_doc_max_bytes = 65536

# --- Features ---
[features]
memories = true
