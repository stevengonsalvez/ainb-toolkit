# =============================================================================
# Claude Code Optimized tmux Configuration
# =============================================================================
# Copy to ~/.tmux.conf or source from your existing config:
#   source-file /path/to/this/tmux.conf
# =============================================================================

# -----------------------------------------------------------------------------
# History & Performance
# -----------------------------------------------------------------------------

# Large history buffer for scrollback
set -g history-limit 1000000

# Enable mouse support for scrolling and pane selection
set -g mouse on

# -----------------------------------------------------------------------------
# Anti-flicker Settings for Claude Code
# Reduces flickering when Claude updates rapidly in tmux
# -----------------------------------------------------------------------------

# Eliminate escape sequence delay (default 500ms)
set -sg escape-time 0

# Reduce status bar refresh frequency
set -g status-interval 30

# Disable automatic window rename (reduces CPU)
setw -g automatic-rename off

# Proper terminal for 256 colors
set -g default-terminal "tmux-256color"

# Enable RGB/true color support
set -as terminal-features ",*:RGB"

# Disable title updates (prevents some flicker)
set -g set-titles off

# -----------------------------------------------------------------------------
# Claude Code Session Isolation
# Prevents nested session errors when running Claude in tmux
# -----------------------------------------------------------------------------

# Tell tmux to refresh these variables from environment on attach/create
# This prevents stale CLAUDECODE values from causing nested session errors
#
# Without this, if you run Claude in tmux, the CLAUDECODE=1 env var gets
# captured in tmux's global environment. New tmux sessions then inherit it,
# causing "cannot be launched inside another Claude Code session" errors.
set-option -g update-environment "CLAUDECODE CLAUDE_CODE_ENTRYPOINT"

# -----------------------------------------------------------------------------
# Optional: Useful Keybindings
# -----------------------------------------------------------------------------

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
